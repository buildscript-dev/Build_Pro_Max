<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f6f1e5"/>
      <stop offset="100%" stop-color="#efe8d6"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f06b1c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f06b1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#ffd580"/>
      <stop offset="55%" stop-color="#f06b1c"/>
      <stop offset="85%" stop-color="#c2185b"/>
      <stop offset="100%" stop-color="#6a0dad"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Outer halo glow -->
  <circle cx="256" cy="256" r="200" fill="url(#halo)"/>

  <!-- Ring 1 -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#f5a524" stroke-width="2.5" stroke-opacity="0.3" stroke-dasharray="none"/>

  <!-- Ring 2 dashed -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#e7402e" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="8 6"/>

  <!-- Core orb -->
  <circle cx="256" cy="256" r="112" fill="url(#core)"/>

  <!-- Shine overlay -->
  <circle cx="256" cy="256" r="112" fill="url(#shine)"/>

  <!-- Inner specular highlight -->
  <ellipse cx="228" cy="218" rx="38" ry="28" fill="#ffffff" fill-opacity="0.32" transform="rotate(-15 228 218)"/>
</svg>
